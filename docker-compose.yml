version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: attendance_db
    environment:
      POSTGRES_DB: attendance
      POSTGRES_USER: attendance
      POSTGRES_PASSWORD: attendance
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U attendance -d attendance"]
      interval: 5s
      timeout: 3s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: attendance_app
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: attendance
      DB_PASSWORD: attendance
      DB_NAME: attendance
      DB_SSLMODE: disable
      DB_CHANNEL_BINDING: prefer
      ADMIN_LOGIN: admin
      ADMIN_PASSWORD: admin123

volumes:
  pgdata:

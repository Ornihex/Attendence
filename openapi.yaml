openapi: 3.0.3
info:
  title: Student Attendance API
  version: 1.0.0
  description: API для учёта посещаемости учеников

servers:
  - url: /api/v1

tags:
  - name: Auth
  - name: Users
  - name: Classes
  - name: Attendance
  - name: Statistics

components:

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    Role:
      type: string
      enum: [teacher, admin]

    ErrorResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string

    LoginRequest:
      type: object
      required: [login, password]
      properties:
        login:
          type: string
        password:
          type: string

    LoginResponse:
      type: object
      properties:
        accessToken:
          type: string
        role:
          $ref: '#/components/schemas/Role'
        userId:
          type: integer

    UserResponse:
      type: object
      properties:
        id:
          type: integer
        login:
          type: string
        role:
          $ref: '#/components/schemas/Role'
        classId:
          type: integer
          nullable: true
        promotedBy:
          type: integer
          nullable: true

    UpdateCredentialsRequest:
      type: object
      properties:
        login:
          type: string
        password:
          type: string

    UpdateRoleRequest:
      type: object
      required: [role]
      properties:
        role:
          $ref: '#/components/schemas/Role'

    CreateTeacherRequest:
      type: object
      required: [login, password]
      properties:
        login:
          type: string
        password:
          type: string

    ClassResponse:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        teacherId:
          type: integer

    CreateClassRequest:
      type: object
      required: [name, teacherId]
      properties:
        name:
          type: string
        teacherId:
          type: integer

    ExcusedAbsence:
      type: object
      required: [fullName, reason]
      properties:
        fullName:
          type: string
        reason:
          type: string

    AttendanceResponse:
      type: object
      properties:
        date:
          type: string
          format: date
        classId:
          type: integer
        isFilled:
          type: boolean
          description: true, если по классу за эту дату есть хотя бы одна сохраненная запись посещаемости
        totalStudents:
          type: integer
        presentCount:
          type: integer
        absentUnexcused:
          type: array
          items:
            type: object
            properties:
              fullName:
                type: string
        absentExcused:
          type: array
          items:
            type: object
            properties:
              fullName:
                type: string
              reason:
                type: string

    AttendanceByClassesResponse:
      type: array
      items:
        $ref: '#/components/schemas/AttendanceResponse'

    AttendanceRequest:
      type: object
      required: [classId, totalStudents, presentCount]
      properties:
        classId:
          type: integer
        totalStudents:
          type: integer
        presentCount:
          type: integer
        absentUnexcused:
          type: array
          items:
            type: string
        absentExcused:
          type: array
          items:
            $ref: '#/components/schemas/ExcusedAbsence'

    WeeklyStatisticsResponse:
      type: object
      properties:
        classId:
          type: integer
        from:
          type: string
          format: date
        to:
          type: string
          format: date
        totalStudents:
          type: integer
        presentCount:
          type: integer
        filledDays:
          type: integer

    WeeklyStatisticsByClassesResponse:
      type: array
      items:
        $ref: '#/components/schemas/WeeklyStatisticsResponse'

paths:

  /auth/login:
    post:
      tags: [Auth]
      summary: Авторизация пользователя
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Успешная авторизация
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Неверные данные
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users:
    post:
      tags: [Users]
      summary: Зарегистрировать учителя (admin only)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTeacherRequest'
      responses:
        '201':
          description: Учитель создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '403':
          description: Нет прав
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Логин уже занят
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      tags: [Users]
      summary: Получить список пользователей (admin only)
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Список пользователей
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserResponse'
        '403':
          description: Нет прав

  /profile/credentials:
    patch:
      tags: [Users]
      summary: Изменить собственный логин/пароль
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCredentialsRequest'
      responses:
        '200':
          description: Обновлено
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '400':
          description: Нет полей для обновления
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Логин уже занят
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/{id}/credentials:
    patch:
      tags: [Users]
      summary: Изменить логин/пароль учителя (admin only)
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCredentialsRequest'
      responses:
        '200':
          description: Обновлено
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '400':
          description: Некорректные данные
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Нет прав
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/{id}/role:
    patch:
      tags: [Users]
      summary: Изменить роль пользователя (admin only)
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRoleRequest'
      responses:
        '200':
          description: Обновлено
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '400':
          description: Некорректная роль
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Нет прав
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Пользователь не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /classes:
    get:
      tags: [Classes]
      summary: Получить список классов
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Список классов
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ClassResponse'

    post:
      tags: [Classes]
      summary: Создать класс (admin only)
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateClassRequest'
      responses:
        '201':
          description: Класс создан
        '404':
          description: Учитель не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Имя класса занято
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /attendance:
    get:
      tags: [Attendance]
      summary: Получить посещаемость за дату (по классу или по всем классам для admin)
      security:
        - BearerAuth: []
      parameters:
        - name: date
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: classId
          in: query
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: Посещаемость
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/AttendanceResponse'
                  - $ref: '#/components/schemas/AttendanceByClassesResponse'
        '403':
          description: Нет прав
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Класс не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags: [Attendance]
      summary: Заполнить или обновить посещаемость
      security:
        - BearerAuth: []
      parameters:
        - name: date
          in: query
          required: true
          schema:
            type: string
            format: date
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttendanceRequest'
      responses:
        '200':
          description: Сохранено
        '400':
          description: Некорректные totals или absent списки
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Нет прав
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Класс не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /statistics/weekly:
    get:
      tags: [Statistics]
      summary: Получить недельную статистику (по классу или по всем классам для admin)
      security:
        - BearerAuth: []
      parameters:
        - name: startDate
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: classId
          in: query
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: Статистика
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/WeeklyStatisticsResponse'
                  - $ref: '#/components/schemas/WeeklyStatisticsByClassesResponse'
